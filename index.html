<!DOCTYPE html>
 <html lang="es"> 
    <head> 
        <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
         <title>Título</title>

         <body>
             <script src="script.js"> </script> 
             
  
<form action="." class="form">
  <div class="form">
    <label for="nombreCompleto">Digite su nombre completo: </label>
    <input type="text" name="nombre" id="nombre" required />
  </div>
  <div class="form">
    <label for="edad">Digite su edad: </label>
    <input type="number" name="edad" id="edad" required />
  </div>
  <div class="form-example">
    <input type="submit" value="Subscribe!" />
  </div>
<div class="form">
<label for="tipoDocumento">Seleccione su tipo de documento:</label>
<input type="text" name="tipodedocumento" id="tipodedocumento" required />
<select name="tipodocumento" id="tipodocumento">
  <option value="">Porfavor selecciona una opción</option>
  <option value="ceduladeciudadania">Cédula de ciudadanía</option>
  <option value="tarjetadeidentidad">Tarjeta de identidad</option>
  <option value="registrocivil">Registro civil</option>
  <option value="ceduladeextranjeria">Cédula de extranjería</option>
</select>
</div>
<div class="form">
    <label for="numeroDocumento">Digite su numero de documento: </label>
    <input type="number" name="numerodedocumento" id="numerodedocumento" required />
  </div>

</form>
